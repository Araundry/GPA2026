<!DOCTYPE html>
<html lang="ja">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>洗濯物カンソーク君</title>
   <style>
       /* 4個用にバランスを再調整したCSS */
       body/*←ページ全体の設定*/ { 
          font-family:/*←フォント*/
          sans-serif; text-align: center;/*←現:中央揃え*/
          background: #E6FFE1;/*←背景色*/
          color: #333;/*←文字色*/
          padding: 15px;/*←内側余白*/
          margin: 0;/*←外側余白*/ 
       }
       h1 { color: #00796b; margin-bottom: 5px; font-size: 24px; }
       .intro { font-size: 13px; color: #555; margin-bottom: 15px; padding: 0 10px; }
       .time { font-size: 11px; color: #888; margin-bottom: 20px; }
       
       .container { 
           display: flex; 
           flex-wrap: wrap; 
           justify-content: center; 
           gap: 10px; 
           max-width: 100%; 
           margin: 0 auto; 
       }
       
       /* 4つがバランスよく画面に広がるように調整 */
       .card { 
           background: white; 
           padding: 15px 5px; 
           border-radius: 10px; 
           flex: 1;
           min-width: 70px; 
           max-width: 130px; 
           box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
       }
       
       .label { font-size: 12px; color: #00796b; font-weight: bold; }
       .value { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 5px 0; }
       .unit { font-size: 11px; color: #666; }
   </style>
</head>
<body>
   <h1>洗濯物カンソーク君</h1>
   <p class="intro">こちらは洗濯物カンソーク君のウェブサイトです。あなたのおうちのベランダ、観測しちゃうぞ☆</p>
   
   <div class="time">ベランダ同期中... (最終観測: <span id="update-time">--:--:--</span>)</div>

   <!-- 気圧を削除して4つに並び替えました -->
   <div class="container">
       <div class="card"><div class="label">温度</div><div class="value" id="temp">--</div><div class="unit">°C</div></div>
       <div class="card"><div class="label">湿度</div><div class="value" id="humid">--</div><div class="unit">%</div></div>
       <div class="card"><div class="label">明るさ</div><div class="value" id="lux">--</div><div class="unit">lx</div></div>
       <div class="card"><div class="label">風速</div><div class="value" id="wind">--</div><div class="unit">m/s</div></div>
   </div>

   <script>
       async function fetchKansoku() {
           try {
               const response = await fetch('./data.json?t=' + Date.now());
               const data = await response.json();
               
               // 気圧の読み込み処理を削除しました
               document.getElementById('temp').innerText = data.temperature;
               document.getElementById('humid').innerText = data.humidity;
               document.getElementById('lux').innerText = data.lux;
               document.getElementById('wind').innerText = data.wind_speed;
               document.getElementById('update-time').innerText = data.last_update;
           } catch (e) {
               console.log("データの読み込みを待機中...", e);
           }
       }
       fetchKansoku();
       setInterval(fetchKansoku, 30000);
   </script>
</body>
</html>
