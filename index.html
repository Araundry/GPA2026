<!DOCTYPE html>
<html lang="ja">
<head>
   <meta http-equiv="refresh" content="60">
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>洗濯物カンソーク君</title>
   <style>
       /* 2行（3個・2個）で綺麗に整列させるためのCSS */
       body/*←ページ全体の設定*/ {
           font-family: sans-serif; /*←フォント*/
           text-align:  center;     /*←現:中央揃え*/
           background:  #e0f2f1;    /*←背景色*/
           color:       #333;       /*←文字色*/
           padding:     15px;       /*←内側余白*/
           margin:      0;          /*←外側余白*/
       }
       h1 { color: #00796b; margin-bottom: 5px; font-size: 24px; }
       .intro { font-size: 13px; color: #555; margin-bottom: 15px; padding: 0 10px; }
       .time { font-size: 11px; color: #888; margin-bottom: 20px; }
       
       /* カードを囲む枠：自動で折り返して中央に寄せる設定 */
       .container { 
           display: flex; 
           flex-wrap: wrap; 
           justify-content: center; 
           gap: 12px; 
           max-width: 360px; /* 👈 ここで幅を制限して、自動的に3個と2個に分かれるようにしています */
           margin: 0 auto; 
       }
       
       /* 2行になっても1個ずつが引き締まって見えるサイズ */
       .card { 
           background: white; 
           padding: 15px 5px; 
           border-radius: 10px; 
           flex: 1;
           min-width: 90px; /* 👈 縮みすぎないようにして、3個並んだら次の行に落とす */
           max-width: 110px; 
           box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
       }
       
       .label { font-size: 12px; color: #00796b; font-weight: bold; }
       .value { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 5px 0; }
       .unit { font-size: 11px; color: #666; }
   </style>
</head>
<body>
   <h1>洗濯物カンソーク君</h1>
   <p class="intro">こちらは洗濯物カンソーク君のウェブサイトです。あなたのおうちのベランダ、観測しちゃうぞ☆</p>
   
   <div class="time">ベランダ同期中... (最終観測: <span id="update-time">--:--:--</span>)</div>

   <!-- 気圧を復活させて5つのカードにしました -->
   <div class="container">
       <div class="card"><div class="label">温度</div><div class="value" id="temp">--</div><div class="unit">°C</div></div>
       <div class="card"><div class="label">湿度</div><div class="value" id="humid">--</div><div class="unit">%</div></div>
       <div class="card"><div class="label">気圧</div><div class="value" id="press">--</div><div class="unit">hPa</div></div>
       <div class="card"><div class="label">明るさ</div><div class="value" id="lux">--</div><div class="unit">lx</div></div>
       <div class="card"><div class="label">風速</div><div class="value" id="wind">--</div><div class="unit">m/s</div></div>
   </div>

   <!-- 🤖 【新しく追加】5大カードの下にくる「雨観測・干し時」のメッセージ枠 -->
   <div style="background: white; border-radius: 10px; padding: 15px; max-width: 330px; margin: 20px auto 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
       <div style="font-size: 13px; color: #00796b; font-weight: bold; margin-bottom: 5px;">洗濯アドバイザーの診断</div>
       <div id="laundry-match" style="font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 5px;">🤔 計算中...</div>
       <div id="rain-forecast" style="font-size: 12px; color: #666;">データを読み込んでいます。</div>
   </div>
      <!-- ☔ 雨の予測カード（アドバイザーの下に追加） -->
   <div style="background: white; border-radius: 10px; padding: 15px; max-width: 330px; margin: 15px auto 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
       <div style="font-size: 13px; color: #00796b; font-weight: bold; margin-bottom: 5px;">雨の予測</div>
       <div id="rain_judge" style="font-size: 15px; color: #2c3e50;">データを読み込んでいます…</div>
   </div>

   
   <script>
       async function fetchKansoku() {
           try {
               const response = await fetch('./data.json?t=' + Date.now());
               const data = await response.json();
               
               // JavaScript側でも気圧（press）をしっかりキャッチして流し込む
               document.getElementById('temp').innerText = data.temperature;
               document.getElementById('humid').innerText = data.humidity;
               document.getElementById('press').innerText = data.pressure; // 👈 復活！
               document.getElementById('lux').innerText = data.lux;
               document.getElementById('wind').innerText = data.wind_speed;
               document.getElementById('update-time').innerText = data.last_update;
               document.getElementById('laundry-match').innerText = data.laundry_match;
               document.getElementById('rain_judge').innerText = data.rain_judge;
           } catch (e) {
               console.log("データの読み込みを待機中...", e);
           }
       }
       fetchKansoku();
       setInterval(fetchKansoku, 60000);
   </script>
</body>
</html>
